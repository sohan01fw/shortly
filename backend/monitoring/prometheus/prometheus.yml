global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: shortly-creation
    static_configs:
      - targets: ["creation:5001"]

  - job_name: shortly-redirect
    static_configs:
      - targets: ["redirect:5002"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]

  - job_name: docker-stats
    static_configs:
      - targets: ["docker-stats-exporter:9101"]
