x-backend-environment: &backend-environment
  DATABASE_URL: postgres://shortly:shortly@postgres:5432/shortly
  REDIS_URL: redis://redis:6379
  SHORT_URL_BASE_URL: http://localhost:5000

x-backend-health: &backend-health
  interval: 5s
  timeout: 3s
  retries: 10
  start_period: 5s

services:
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "5000:5000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      creation:
        condition: service_healthy
      redirect:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:5000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  creation:
    build: .
    command: ["bun", "run", "start:creation"]
    environment:
      <<: *backend-environment
      PORT: 5001
    expose:
      - "5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      <<: *backend-health
      test: ["CMD", "bun", "-e", "const r=await fetch('http://localhost:5001/health');process.exit(r.ok?0:1)"]

  redirect:
    build: .
    command: ["bun", "run", "start:redirect"]
    environment:
      <<: *backend-environment
      REDIRECT_PORT: 5002
    expose:
      - "5002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      <<: *backend-health
      test: ["CMD", "bun", "-e", "const r=await fetch('http://localhost:5002/health');process.exit(r.ok?0:1)"]

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: shortly
      POSTGRES_USER: shortly
      POSTGRES_PASSWORD: shortly
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortly -d shortly"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      creation:
        condition: service_healthy
      redirect:
        condition: service_healthy
      postgres-exporter:
        condition: service_started
      redis-exporter:
        condition: service_started
      nginx-exporter:
        condition: service_started
      cadvisor:
        condition: service_started

  grafana:
    image: grafana/grafana:12.1.0
    ports:
      - "8080:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-shortly}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    environment:
      DATA_SOURCE_NAME: postgresql://shortly:shortly@postgres:5432/shortly?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:v1.75.0
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.2
    command: ["--nginx.scrape-uri=http://gateway:8081/stub_status"]
    depends_on:
      gateway:
        condition: service_healthy

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
