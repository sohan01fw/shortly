x-backend-environment: &backend-environment
  DATABASE_URL: postgres://shortly:shortly@postgres:5432/shortly
  REDIS_URL: redis://redis:6379
  SHORT_URL_BASE_URL: http://localhost:5000

x-backend-health: &backend-health
  interval: 5s
  timeout: 3s
  retries: 10
  start_period: 5s

services:
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "5000:5000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      creation:
        condition: service_healthy
      redirect:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:5000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  creation:
    build: .
    command: ["bun", "run", "start:creation"]
    environment:
      <<: *backend-environment
      PORT: 5001
    expose:
      - "5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      <<: *backend-health
      test: ["CMD", "bun", "-e", "const r=await fetch('http://localhost:5001/health');process.exit(r.ok?0:1)"]

  redirect:
    build: .
    command: ["bun", "run", "start:redirect"]
    environment:
      <<: *backend-environment
      REDIRECT_PORT: 5002
    expose:
      - "5002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      <<: *backend-health
      test: ["CMD", "bun", "-e", "const r=await fetch('http://localhost:5002/health');process.exit(r.ok?0:1)"]

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: shortly
      POSTGRES_USER: shortly
      POSTGRES_PASSWORD: shortly
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortly -d shortly"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
