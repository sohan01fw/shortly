worker_processes auto;
worker_rlimit_nofile 8192;

events {
  worker_connections 4096;
}

http {
  resolver 127.0.0.11 valid=10s ipv6=off;

  upstream creation_backend {
    zone creation_backend 64k;
    server creation:5001 resolve;
    keepalive 1024;
  }

  upstream redirect_backend {
    zone redirect_backend 64k;
    server redirect:5002 resolve;
    keepalive 256;
  }

  server {
    listen 8081;

    location = /stub_status {
      stub_status;
      access_log off;
    }
  }

  server {
    listen 5000;

    location = /health {
      default_type application/json;
      return 200 '{"status":"ok"}';
    }

    location = /health/creation {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_pass http://creation_backend/health;
    }

    location = /health/redirect {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_pass http://redirect_backend/health;
    }

    location = /urls {
      error_page 418 = @not_found;
      if ($request_method != POST) {
        return 418;
      }
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_pass http://creation_backend/urls;
    }

    location ~ "^/[0-9A-Za-z]{7}$" {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_pass http://redirect_backend;
    }

    location / {
      try_files "" @not_found;
    }

    location @not_found {
      default_type application/json;
      return 404 '{"error":{"code":"SHORT_URL_NOT_FOUND","message":"Short URL not found."}}';
    }
  }
}
